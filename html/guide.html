*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html {
    scroll-behavior:smooth;
    scroll-padding-top:calc(var(--theme-bar-height) + var(--app-header-height) + 1rem);
}
body {
    font-family:'Old-Country-Nobility',serif;
    font-size:12pt; line-height:1.7;
    color:var(--text-primary); background:var(--bg-primary);
    transition:background .25s, color .25s;
}

/* ── Theme bar ── */
#theme-bar {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    display:flex; align-items:center; justify-content:flex-end;
    gap:.5rem; height:var(--theme-bar-height); padding:0 1.2rem;
    background:var(--switcher-bg); border-bottom:1px solid var(--switcher-border);
    box-shadow:0 1px 6px var(--shadow-color);
    transition:background .25s;
}
#theme-bar .bar-label {
    font-size:8.5pt; letter-spacing:.1em; text-transform:uppercase;
    color:var(--text-muted); margin-right:.4rem;
}
.theme-btn {
    display:flex; align-items:center; gap:.35rem;
    padding:.25rem .65rem; border:1.5px solid var(--border-color); border-radius:3px;
    background:transparent; cursor:pointer;
    font-family:'Old-Country-Nobility',serif; font-size:8.5pt;
    color:var(--text-secondary); letter-spacing:.04em;
    transition:all .2s;
}
.theme-btn:hover { border-color:var(--accent); color:var(--text-primary); }
.theme-btn.active { border-color:var(--accent); color:var(--text-primary); font-weight:bold; }
.swatch {
    display:inline-block; width:9px; height:9px; border-radius:50%;
    border:1px solid rgba(0,0,0,.15); flex-shrink:0;
}
.swatch-midnight { background:#1e293b; }
.swatch-light    { background:#dbeafe; border-color:#93c5fd; }
.swatch-icecold  { background:#a0d2eb; }
.swatch-dark     { background:#2f3648; }
.swatch-sunset   { background:#f76f53; }

/* ── Layout ── */
.wrapper {
    display:block;
    min-height:100vh;
    padding-top:calc(var(--theme-bar-height) + var(--app-header-height));
}

/* ── Sidebar ── */
.sidebar {
    width:var(--sidebar-width); min-width:var(--sidebar-width);
    background:var(--bg-secondary); border-right:1px solid var(--border-color);
    padding:1.4rem 1rem;
    position:fixed;
    top:calc(var(--theme-bar-height) + var(--app-header-height));
    bottom:0;
    left:0;
    overflow-y:auto;
    overscroll-behavior:contain;
    font-size:9.5pt;
    z-index:800;
    transition:background .25s, border-color .25s;
}
.sidebar-section {
    margin-bottom:1.2rem;
}
.sidebar-section-label {
    font-size:7.5pt; letter-spacing:.12em; text-transform:uppercase;
    color:var(--text-muted); padding:.15rem .3rem;
    margin-bottom:.4rem;
    border-bottom:2px solid var(--section-border);
    transition:border-color .25s;
}
.guide2-label { border-bottom-color:var(--guide2-h1) !important; }
.sidebar .toc ul { list-style:none; padding-left:0; }
.sidebar .toc ul ul {
    padding-left:.85em; border-left:1px solid var(--border-color); margin-left:.1em;
}
.sidebar .toc a {
    font-family:'Old-Country-Nobility',serif;
    color:var(--text-secondary); text-decoration:none;
    display:block; padding:.1rem .3rem; line-height:1.45; border-radius:2px;
    transition:color .15s, background .15s;
}
.sidebar .toc a:hover { color:var(--text-primary); background:var(--bg-tertiary); }
.sidebar .toc > ul > li > a { font-weight:bold; font-size:9pt; color:var(--text-primary); margin-top:.2rem; }
.sidebar::-webkit-scrollbar { width:8px; }
.sidebar::-webkit-scrollbar-track { background:transparent; }
.sidebar::-webkit-scrollbar-thumb { background:var(--bg-tertiary); border-radius:4px; }

/* ── Main content ── */
.content {
    margin-left:var(--sidebar-width);
    padding:2.8rem 4rem; max-width:1040px; min-width:0;
    background:var(--bg-primary); transition:background .25s;
}

/* ── App header ── */
.header {
    background:var(--bg-secondary);
    border-bottom:1px solid var(--border-color);
    box-shadow:0 1px 4px var(--shadow-color);
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:var(--app-header-height);
    padding:12px 20px;
    position:fixed;
    top:var(--theme-bar-height);
    left:0;
    right:0;
    z-index:900;
    transition:background .25s, border-color .25s;
}
.header-content {
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
}
.logo {
    display:block;
    width:24px;
    height:24px;
    flex-shrink:0;
}
.logo circle { stroke:none; }
.header-text {
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:2px;
    min-width:0;
}
.header h1 {
    border:0;
    color:var(--text-primary);
    font-size:16px;
    font-weight:600;
    line-height:1.2;
    margin:0;
    max-width:100%;
    overflow-wrap:anywhere;
    padding:0;
}
.version {
    background:var(--accent);
    border-radius:3px;
    color:#ffffff;
    font-size:10px;
    font-weight:500;
    line-height:1.2;
    padding:2px 6px;
    max-width:100%;
    overflow-wrap:anywhere;
}

/* ── Guide divider ── */
.guide-divider {
    display:flex; align-items:center; gap:1rem;
    margin:3.5rem 0 2.5rem 0;
    padding:1.2rem 1.5rem;
    background:var(--divider-bg);
    border:1px solid var(--divider-line);
    border-radius:4px;
    border-left:4px solid var(--guide2-h1);
    transition:background .25s, border-color .25s;
}
.guide-divider .divider-icon {
    font-size:1.5rem; flex-shrink:0;
}
.guide-divider .divider-text { flex:1; }
.guide-divider .divider-text strong {
    display:block;
    font-family:'Old-Country-Nobility',serif;
    font-size:11pt;
    color:var(--guide2-h1);
    margin-bottom:.15rem;
    transition:color .25s;
}
.guide-divider .divider-text span {
    font-size:9.5pt;
    color:var(--text-muted);
}

/* ── Typography ── */
h1,h2,h3 {
    scroll-margin-top:calc(var(--theme-bar-height) + var(--app-header-height) + 1rem);
}
h1 {
    font-family:'Old-Country-Nobility',serif; font-size:22pt; font-weight:bold;
    color:var(--text-primary); border-bottom:2px solid var(--accent);
    padding-bottom:.3em; margin-bottom:.6em;
    transition:color .25s, border-color .25s;
}
.guide2-section h1 {
    border-bottom-color:var(--guide2-h1);
    color:var(--guide2-h1);
}
h2 {
    font-family:'Old-Country-Nobility',serif; font-size:14.5pt; font-weight:bold;
    color:var(--text-primary); margin-top:2.5em; margin-bottom:.6em;
    padding-bottom:.25em; border-bottom:1px solid var(--border-color);
    transition:color .25s, border-color .25s;
}
h3 {
    font-family:'Old-Country-Nobility',serif; font-size:12pt; font-weight:bold;
    color:var(--text-primary); margin-top:1.8em; margin-bottom:.5em;
    padding-left:.6em; border-left:3px solid var(--section-border);
    transition:color .25s, border-color .25s;
}
.guide2-section h3 { border-left-color:var(--guide2-h1); }
p { color:var(--text-secondary); margin-bottom:.85em; text-align:justify; }

code {
    font-family:'Courier New',Courier,monospace; font-size:9pt;
    background:var(--code-bg); border:1px solid var(--code-border);
    padding:.06em .32em; border-radius:2px; color:var(--accent);
    transition:background .25s, border-color .25s, color .25s;
}
pre {
    background:var(--code-bg); border:1px solid var(--code-border);
    border-left:4px solid var(--pre-accent);
    padding:.95em 1.2em; margin:.7em 0 1.3em 0;
    overflow-x:auto; font-size:8.8pt; line-height:1.55;
    border-radius:0 3px 3px 0;
    transition:background .25s, border-color .25s;
}
.guide2-section pre { border-left-color:var(--guide2-h1); }
pre code { background:none; border:none; padding:0; color:var(--text-secondary); font-size:inherit; }
table { width:100%; border-collapse:collapse; margin:1em 0 1.5em 0; font-size:10pt; }
thead { background:var(--table-head-bg); }
th { font-weight:bold; text-align:left; padding:.5em .85em; border:1px solid var(--border-color); color:var(--text-primary); }
td { padding:.42em .85em; border:1px solid var(--border-color); vertical-align:top; color:var(--text-secondary); }
tr:nth-child(even) td { background:var(--table-stripe); }
ul,ol { margin:.4em 0 .9em 1.6em; color:var(--text-secondary); }
li { margin-bottom:.2em; }

@media print {
    #theme-bar,.header,.sidebar { display:none; }
    .wrapper { display:block; padding-top:0; }
    .content { margin-left:0; padding:1in; max-width:100%; }
    pre { page-break-inside:avoid; }
    h2 { page-break-before:always; }
    h2:first-of-type { page-break-before:avoid; }
}

@media (max-width: 900px) {
    .sidebar {
        position:static;
        width:100%;
        min-width:0;
        max-height:40vh;
        border-right:0;
        border-bottom:1px solid var(--border-color);
    }
    .content {
        margin-left:0;
        max-width:100%;
        padding:2rem 1.25rem;
    }
}
</style>
</head>
