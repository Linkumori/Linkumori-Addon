name: Build and Sign Extension

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump type: stable/minor, patch fix, or explicit final version.'
        required: false
        default: stable
        type: choice
        options:
          - stable
          - patch
          - final
      version:
        description: 'Final extension version (e.g. 67.1.0). Required for release_type=final; optional override for stable/patch.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-sign:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install web-ext
        run: bun install -g web-ext

      - name: Install librsvg
        run: sudo apt-get install -y librsvg2-bin

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: version
        run: |
          RELEASE_TYPE="${{ inputs.release_type || 'stable' }}"
          REQUESTED_VERSION="${{ inputs.version }}"
          CURRENT=$(jq -r '.version' manifest.json)

          normalize_version() {
            local version="$1"
            if ! echo "$version" | grep -Eq '^[0-9]+(\.[0-9]+){1,2}$'; then
              echo "ERROR: Version must be numeric MAJOR.MINOR or MAJOR.MINOR.PATCH, got: $version" >&2
              exit 1
            fi

            IFS='.' read -r major minor patch <<< "$version"
            patch="${patch:-0}"
            echo "${major}.${minor}.${patch}"
          }

          CURRENT="$(normalize_version "$CURRENT")"

          if [ -n "$REQUESTED_VERSION" ]; then
            NEXT="$(normalize_version "$REQUESTED_VERSION")"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            case "$RELEASE_TYPE" in
              stable)
                NEXT="${MAJOR}.$((MINOR + 1)).0"
                ;;
              patch)
                NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
                ;;
              final)
                echo "ERROR: release_type=final requires an explicit version input." >&2
                exit 1
                ;;
              *)
                echo "ERROR: Unknown release_type: $RELEASE_TYPE" >&2
                exit 1
                ;;
            esac
          fi

          echo "value=$NEXT" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Bump manifest version
        run: |
          jq --arg ver "${{ steps.version.outputs.value }}" '.version = $ver' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Build extension
        run: bun run linkumori-cli-tool.js build

      - name: Verify build artifacts
        run: |
          shopt -s nullglob
          artifacts=(web-ext-artifacts/*)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "ERROR: No artifacts found in web-ext-artifacts/ — build step may have failed."
            exit 1
          fi
          echo "Found ${#artifacts[@]} artifact(s):"
          printf '  %s\n' "${artifacts[@]}"

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "release ${{ steps.version.outputs.value }}"
          git push

      - name: Generate commit history
        run: bun run linkumori-cli-tool.js commit-history

      - name: Commit commit history
        run: |
          if git diff --quiet; then
            echo "No commit history changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "chore: update commit history for v${{ steps.version.outputs.value }}"
          git push

      - name: Generate changelog
        run: bun run changelog:auto

      - name: Commit changelog
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes to commit."
            exit 0
          fi
          git add CHANGELOG.md
          git commit -m "chore: update changelog for v${{ steps.version.outputs.value }}"
          git push

      - name: Sign and upload to AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
          WEB_EXT_CHANNEL: ${{ secrets.WEB_EXT_CHANNEL }}
        run: bun run scripts/amo-upload.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linkumori-${{ steps.version.outputs.value }}
          path: web-ext-artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.value }}"
          SECTION_FILE="release-section.txt"

          awk -v version="${VERSION}" '
            {
              line=$0
              sub(/\r$/, "", line)
            }
            index(line, "## [" version "]") == 1 { in_section=1; next }
            in_section && line ~ /^## \[/ { exit }
            in_section { print line }
          ' CHANGELOG.md > "$SECTION_FILE"

          if [ ! -s "$SECTION_FILE" ]; then
            echo "ERROR: Missing changelog section for ${VERSION} in CHANGELOG.md"
            echo "Expected header: ## [${VERSION}] - YYYY-MM-DD"
            exit 1
          fi

          {
            echo "Release ${VERSION} of Linkumori (Clean URLs) Firefox Extension."
            echo
            cat "$SECTION_FILE"
            echo
            echo "Get the signed extension from the Firefox Add-ons store: https://addons.mozilla.org/en-US/firefox/addon/linkumori-clean-urls/"
          } > release-notes.txt

          shopt -s nullglob
          artifacts=(web-ext-artifacts/*)

          gh release create "linkumori-v${{ steps.version.outputs.value }}" \
            "${artifacts[@]}" \
            --title "Linkumori v${{ steps.version.outputs.value }}" \
            --notes-file release-notes.txt \
            --latest
