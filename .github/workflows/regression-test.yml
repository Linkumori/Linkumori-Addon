name: Regression Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  regression:
    name: Firefox Extension Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firefox
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y firefox-esr
          firefox-esr --version

      - name: Install geckodriver
        run: |
          GECKO_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          echo "Installing geckodriver v${GECKO_VERSION}"
          curl -fsSL "https://github.com/mozilla/geckodriver/releases/download/v${GECKO_VERSION}/geckodriver-v${GECKO_VERSION}-linux64.tar.gz" | tar -xz -C /usr/local/bin/
          geckodriver --version

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Start regression server
        run: node tests/regression-server.js &
        working-directory: ${{ github.workspace }}

      - name: Wait for regression server
        run: |
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:18080/health && break
            echo "Waiting for server... ($i)"
            sleep 1
          done

      - name: Run regression suite
        working-directory: tests
        env:
          FIREFOX_BINARY: firefox-esr
          CI_TIMEOUT_MS: '1200000'
        run: node ci-runner.js

      - name: Upload regression results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results-${{ github.run_id }}
          path: tests/regression-results.json
